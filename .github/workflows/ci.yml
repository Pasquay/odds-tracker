name: Laravel CI

# 1. THE TRIGGER: When should the robot wake up?
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# 2. THE JOBS: What should the robot do?
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Step A: Download your code from the GitHub repo onto this new server
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step B: Install the exact version of PHP your app needs
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'

    # Step C: Set up the Laravel environment file
    - name: Copy .env
      run: |
        cp .env.example .env
        sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
        touch database/database.sqlite

    # Step D: Install all your Laravel dependencies (like the Http client)
    - name: Install Dependencies
      run: composer install --quiet --no-interaction --prefer-dist

    # Step E: Generate the security key
    - name: Generate App Key
      run: php artisan key:generate

    # Step F: Run the tests! (Did you break anything?)
    - name: Run Tests
      run: php artisan test